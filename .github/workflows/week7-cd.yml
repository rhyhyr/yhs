# ───────────────────────────────────────────────────────────────
# Week 7 — CD (Build → Test → Deploy) Workflow
# 트리거: main push, 수동 실행
# 목적:
#   ③ Build → Test → Deploy 의존성 + 아티팩트 업로드/다운로드
#
# 흐름:
#   build  ─upload artifact→  test  ─download artifact→  deploy
# ───────────────────────────────────────────────────────────────

name: Week7 CD

on:
  push:
    branches: [main, "week#7"]
  workflow_dispatch:    # 수동 실행 버튼

jobs:
  # ─── Job 1: Build ───────────────────────────────────────────
  build:
    name: Build package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate build metadata
        id: meta
        run: |
          VERSION="0.1.0+$(date +%Y%m%d)-${GITHUB_SHA::7}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Build version: $VERSION"

      - name: Create build directory
        run: |
          mkdir -p build/yhs-package
          # 핵심 파일들만 패키지에 포함 (예시)
          [ -f main.py ]            && cp main.py            build/yhs-package/ || true
          [ -f requirements.txt ]   && cp requirements.txt   build/yhs-package/ || true
          [ -f README.md ]          && cp README.md          build/yhs-package/ || true

          # 빌드 메타데이터 파일 생성
          cat > build/yhs-package/BUILD_INFO.txt <<EOF
          version: ${{ steps.meta.outputs.version }}
          built_at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          commit:  ${GITHUB_SHA}
          ref:     ${GITHUB_REF}
          actor:   ${GITHUB_ACTOR}
          EOF

          echo "─── Built package contents ───"
          ls -la build/yhs-package/
          cat build/yhs-package/BUILD_INFO.txt

      - name: Create tarball
        run: |
          cd build
          tar -czf yhs-package.tar.gz yhs-package/
          ls -la yhs-package.tar.gz

      # ★ 아티팩트 업로드 — 다음 job에서 받아 쓸 수 있게 저장
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: yhs-build
          path: build/yhs-package.tar.gz
          retention-days: 7

  # ─── Job 2: Test (build 결과물 검증) ────────────────────────
  test:
    name: Test built artifact
    needs: build                              # build 끝나야 시작
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ★ 아티팩트 다운로드 — 이전 job 결과물을 가져옴
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: yhs-build
          path: ./downloaded

      - name: Extract and inspect
        run: |
          ls -la downloaded/
          tar -xzf downloaded/yhs-package.tar.gz -C downloaded/
          echo "─── Extracted contents ───"
          ls -la downloaded/yhs-package/
          echo "─── Build info ───"
          cat downloaded/yhs-package/BUILD_INFO.txt

      - name: Run smoke tests
        run: |
          python -m pip install --upgrade pip pytest
          pytest tests/ -v

      - name: Verify build artifact integrity
        run: |
          if [ ! -f downloaded/yhs-package/BUILD_INFO.txt ]; then
            echo "::error::BUILD_INFO.txt missing in artifact!"
            exit 1
          fi
          echo "Artifact integrity OK"

  # ─── Job 3: Deploy (mock) ───────────────────────────────────
  deploy:
    name: Deploy (mock)
    needs: [build, test]                      # build + test 모두 통과해야 시작
    runs-on: ubuntu-latest
    environment: production                   # GitHub Environments 사용 (보호 규칙 적용 가능)
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: yhs-build
          path: ./release

      - name: Mock deploy
        env:
          DEPLOY_TOKEN: ${{ secrets.DEMO_API_KEY }}
        run: |
          echo "═══════════════════════════════════════"
          echo "  🚀 MOCK DEPLOY START"
          echo "═══════════════════════════════════════"
          echo "Version:    ${{ needs.build.outputs.version }}"
          echo "Artifact:   $(ls -la release/)"
          echo "Target:     production (mock)"
          echo ""
          if [ -n "$DEPLOY_TOKEN" ]; then
            echo "Auth:       OK (token length=${#DEPLOY_TOKEN})"
          else
            echo "Auth:       SKIPPED (no DEMO_API_KEY secret)"
          fi
          echo ""
          echo "Simulating deploy..."
          for i in 1 2 3; do
            echo "  step $i/3 ✓"
            sleep 1
          done
          echo ""
          echo "✅ Deploy completed successfully"
          echo "═══════════════════════════════════════"

      - name: Write deploy summary
        # GitHub Actions Job Summary — Actions 탭에서 보기 좋게 표시
        run: |
          {
            echo "## 🚀 Deploy Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Version | \`${{ needs.build.outputs.version }}\` |"
            echo "| Commit  | \`${GITHUB_SHA::7}\` |"
            echo "| Actor   | @${GITHUB_ACTOR} |"
            echo "| Status  | ✅ Success (mock) |"
          } >> "$GITHUB_STEP_SUMMARY"