# GitHub Actions로 배포 빌드 추적
name: Track Deployments
on:
  push:
    branches:
      - '**'
  workflow_dispatch:
  deployment:

jobs:
  track-deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Log Deployment
        run: |
          echo "Deployment at: $(date)"
          echo "Event: ${{ github.event_name }}"
          echo "Environment: ${{ github.event.deployment.environment || 'N/A (non-deployment event)' }}"