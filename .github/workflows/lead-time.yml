name: Track Lead Time

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      simulate_minutes:
        description: '시뮬레이션 Lead Time (분)'
        required: false
        default: '45'

jobs:
  track-lead-time:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Calculate Lead Time
        id: calc
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            LEAD_TIME_MIN="${{ github.event.inputs.simulate_minutes }}"
            LEAD_TIME=$(( LEAD_TIME_MIN * 60 ))
            echo "시뮬레이션 모드: Lead Time = ${LEAD_TIME_MIN}분"
          else
            FIRST_COMMIT_TIME="${{ github.event.pull_request.created_at }}"
            MERGE_TIME="${{ github.event.pull_request.merged_at }}"
            LEAD_TIME=$(( $(date -d "$MERGE_TIME" +%s) - $(date -d "$FIRST_COMMIT_TIME" +%s) ))
            LEAD_TIME_MIN=$(( LEAD_TIME / 60 ))
          fi
          echo "lead_time=$LEAD_TIME" >> $GITHUB_OUTPUT
          echo "lead_time_min=$LEAD_TIME_MIN" >> $GITHUB_OUTPUT
          echo "Lead Time: ${LEAD_TIME}초 (${LEAD_TIME_MIN}분)"

      - name: Save JSON artifact
        run: |
          cat > lead-time-result.json << EOF
          {
            "metric": "lead_time",
            "event": "${{ github.event_name }}",
            "lead_time_seconds": ${{ steps.calc.outputs.lead_time }},
            "lead_time_minutes": ${{ steps.calc.outputs.lead_time_min }},
            "run_id": "${{ github.run_id }}"
          }
          EOF
          cat lead-time-result.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lead-time-${{ github.run_id }}
          path: lead-time-result.json
          retention-days: 30

      - name: Write Job Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## DORA: Lead Time

          | 항목 | 값 |
          |---|---|
          | 실행 방식 | ${{ github.event_name }} |
          | **Lead Time** | **${{ steps.calc.outputs.lead_time_min }}분** |
          EOF
