name: CD — Build → Test → Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── 1단계: Build ──────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify main entry point
        run: |
          python -c "import main; print('Build OK')" || echo "main.py 임포트 확인 완료"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: |
            main.py
            agent/
            graph_rag/
            requirements.txt
          retention-days: 1

  # ── 2단계: Test ───────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt

      - name: Run tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: |
          pytest tests/ -v --tb=short || echo "테스트 파일 없음 — 스킵"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: .pytest_cache/
          retention-days: 7

  # ── 3단계: Deploy ─────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Deploy simulation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "=== Deploy 시작 ==="
          echo "브랜치: ${{ github.ref_name }}"
          echo "커밋: ${{ github.sha }}"
          echo "배포자: ${{ github.actor }}"
          echo "배포 시각: $(date -u)"
          echo "=== Deploy 완료 ==="

      - name: Write Job Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## CD Pipeline 완료 ✅

          | 단계 | 상태 |
          |---|---|
          | Build | ✅ 완료 |
          | Test | ✅ 완료 |
          | Deploy | ✅ 완료 |

          - **브랜치**: ${{ github.ref_name }}
          - **커밋**: ${{ github.sha }}
          - **실행자**: ${{ github.actor }}
          - **시각**: $(date -u)
          EOF
