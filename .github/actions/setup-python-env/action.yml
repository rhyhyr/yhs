name: Setup Python Environment
description: Python 환경 설정 및 의존성 설치 (Composite Action)

inputs:
  python-version:
    description: Python 버전
    required: false
    default: "3.11"

outputs:
  cache-hit:
    description: 캐시 히트 여부
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Record pre-cache time
      id: pre-cache
      shell: bash
      run: echo "start=$(date +%s%3N)" >> $GITHUB_OUTPUT

    - name: Cache pip dependencies
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ inputs.python-version }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ inputs.python-version }}-

    - name: Record post-cache time
      id: post-cache
      shell: bash
      run: echo "end=$(date +%s%3N)" >> $GITHUB_OUTPUT

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        pip install -r requirements.txt

    - name: Report cache performance
      shell: bash
      run: |
        START=${{ steps.pre-cache.outputs.start }}
        END=${{ steps.post-cache.outputs.end }}
        ELAPSED=$((END - START))
        HIT=${{ steps.cache.outputs.cache-hit }}
        echo "### 캐시 성능 리포트" >> $GITHUB_STEP_SUMMARY
        echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
        echo "|---|---|" >> $GITHUB_STEP_SUMMARY
        echo "| 캐시 히트 | ${HIT:-false} |" >> $GITHUB_STEP_SUMMARY
        echo "| 캐시 조회 시간 | ${ELAPSED}ms |" >> $GITHUB_STEP_SUMMARY
